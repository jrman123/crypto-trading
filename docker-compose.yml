version: '3.8'

services:
  # PostgreSQL Database - source of truth
  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network

  # Ingestor - pulls candle data from exchange
  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_ingestor
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - EXCHANGE=${EXCHANGE:-binance}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      - INGESTOR_INTERVAL_SECONDS=${INGESTOR_INTERVAL_SECONDS:-60}
    command: python -u /app/apps/ingestor/main.py
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trading_network

  # Feature Builder - computes technical indicators
  feature_builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_feature_builder
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - FEATURE_BUILDER_INTERVAL_SECONDS=${FEATURE_BUILDER_INTERVAL_SECONDS:-60}
    command: python -u /app/apps/feature_builder/main.py
    depends_on:
      postgres:
        condition: service_healthy
      ingestor:
        condition: service_started
    restart: unless-stopped
    networks:
      - trading_network

  # Signal Engine - generates trade signals
  signal_engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_signal_engine
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SIGNAL_ENGINE_INTERVAL_SECONDS=${SIGNAL_ENGINE_INTERVAL_SECONDS:-120}
    command: python -u /app/apps/signal_engine/main.py
    depends_on:
      postgres:
        condition: service_healthy
      feature_builder:
        condition: service_started
    restart: unless-stopped
    networks:
      - trading_network

  # Execution Bot - executes trades based on signals
  execution_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_execution_bot
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - EXCHANGE=${EXCHANGE:-binance}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - EXECUTION_BOT_INTERVAL_SECONDS=${EXECUTION_BOT_INTERVAL_SECONDS:-30}
    command: python -u /app/apps/execution_bot/main.py
    depends_on:
      postgres:
        condition: service_healthy
      signal_engine:
        condition: service_started
    restart: unless-stopped
    networks:
      - trading_network

  # Web Agent - ingests news and web intelligence
  web_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading_web_agent
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-trading_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - WEB_AGENT_INTERVAL_SECONDS=${WEB_AGENT_INTERVAL_SECONDS:-300}
    command: python -u /app/apps/web_agent/main.py
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trading_network

volumes:
  postgres_data:
    driver: local

networks:
  trading_network:
    driver: bridge
